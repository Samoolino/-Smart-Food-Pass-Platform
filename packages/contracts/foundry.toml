[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
ffi = false
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=node_modules/forge-std/src/"
]
