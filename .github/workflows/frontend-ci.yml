name: Frontend CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend route tests
        run: pnpm --filter @smartfoodpass/frontend test -- --runInBand

      - name: Run frontend type check
        run: pnpm --filter @smartfoodpass/frontend type-check
