name: Contracts

on:
  pull_request:
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/contracts.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  foundry:
    name: Foundry tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run forge tests
        working-directory: packages/contracts
        run: forge test -vvv
